
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #e8f4f8;
    --primary: #4a3b8c;
    --accent: #c94fa0;
    --green: #2db87a;
    --card-bg: #ffffff;
    --text: #1a1a2e;
    --muted: #5a5a7a;
    --radius: 14px;
    --border: rgba(74,59,140,0.15);
  }
  body { font-family: 'Segoe UI', Arial, sans-serif; direction: rtl; }
  #app { min-height: 100vh; background: var(--bg); }

  /* NAV */
  nav {
    background: var(--primary);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(74,59,140,0.3);
  }
  .nav-brand { color: #fff; font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
  .nav-brand span { color: #f7b8df; }
  .nav-links { display: flex; gap: 6px; }
  .nav-btn {
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25);
    color: #fff; padding: 6px 14px; border-radius: 20px; cursor: pointer;
    font-size: 13px; transition: all 0.2s; font-family: inherit;
  }
  .nav-btn:hover, .nav-btn.active { background: var(--accent); border-color: var(--accent); }

  /* PAGES */
  .page { display: none; padding: 2rem; max-width: 1100px; margin: 0 auto; }
  .page.active { display: block; }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, var(--primary) 0%, #7b4fa0 100%);
    border-radius: 20px; padding: 3rem 2rem; text-align: center;
    color: #fff; margin-bottom: 2rem; position: relative; overflow: hidden;
  }
  .hero-dna { font-size: 60px; margin-bottom: 1rem; opacity: 0.9; }
  .hero h1 { font-size: 2.2rem; margin-bottom: 0.5rem; }
  .hero p { font-size: 1.1rem; opacity: 0.85; margin-bottom: 1.5rem; }
  .hero-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 1.5rem; }
  .hero-stat {
    background: rgba(255,255,255,0.15); border-radius: 12px; padding: 1rem;
    backdrop-filter: blur(4px);
  }
  .hero-stat-num { font-size: 2rem; font-weight: 700; color: #f7b8df; }
  .hero-stat-lbl { font-size: 13px; opacity: 0.85; }

  /* SECTION CARDS */
  .section-title {
    font-size: 1.3rem; color: var(--primary); font-weight: 700;
    margin-bottom: 1rem; display: flex; align-items: center; gap: 8px;
  }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 2rem; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
  .card {
    background: var(--card-bg); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 1.25rem;
    cursor: pointer; transition: all 0.2s;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(74,59,140,0.15); }
  .card-icon { font-size: 32px; margin-bottom: 0.5rem; }
  .card-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; }
  .card-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .card-badge {
    display: inline-block; background: #f0ebff; color: var(--primary);
    font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-top: 8px;
  }

  /* ABOUT */
  .about-card {
    background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border);
    overflow: hidden; margin-bottom: 1.5rem;
  }
  .about-header {
    background: var(--primary); padding: 2rem; text-align: center; color: #fff;
  }
  .about-avatar {
    width: 80px; height: 80px; border-radius: 50%;
    background: rgba(255,255,255,0.2); margin: 0 auto 1rem;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; border: 3px solid rgba(255,255,255,0.4);
  }
  .about-header h2 { font-size: 1.4rem; margin-bottom: 0.3rem; }
  .about-header p { opacity: 0.8; font-size: 14px; }
  .about-body { padding: 1.5rem; }
  .about-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .about-row:last-child { border-bottom: none; margin-bottom: 0; }
  .about-row-icon { font-size: 24px; }
  .about-row-label { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
  .about-row-val { font-size: 15px; color: var(--text); font-weight: 500; }
  .nav-links-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-top: 1rem; }
  .nav-link-btn {
    background: var(--primary); color: #fff; border: none;
    padding: 12px 16px; border-radius: 12px; cursor: pointer;
    font-family: inherit; font-size: 14px; font-weight: 600;
    text-align: center; transition: all 0.2s; display: flex; align-items: center; gap: 8px; justify-content: center;
  }
  .nav-link-btn:hover { background: var(--accent); transform: scale(1.02); }

  /* GAMES */
  .game-card {
    background: var(--card-bg); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 1.25rem;
    cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column;
  }
  .game-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(74,59,140,0.15); }
  .game-header { display: flex; align-items: center; gap: 12px; margin-bottom: 0.75rem; }
  .game-icon { font-size: 36px; }
  .game-meta { flex: 1; }
  .game-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .game-sub { font-size: 12px; color: var(--muted); }
  .game-topics { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 1rem; flex: 1; }
  .play-btn {
    background: var(--primary); color: #fff; border: none;
    padding: 8px 0; border-radius: 8px; cursor: pointer;
    font-family: inherit; font-size: 13px; font-weight: 600; width: 100%;
    transition: all 0.2s;
  }
  .play-btn:hover { background: var(--accent); }

  /* QUIZ MODAL */
  .quiz-overlay {
    position: fixed; inset: 0; background: rgba(26,26,46,0.7);
    z-index: 200; display: none; align-items: center; justify-content: center;
  }
  .quiz-overlay.open { display: flex; }
  .quiz-box {
    background: #fff; border-radius: 20px; padding: 2rem;
    max-width: 560px; width: 90%; position: relative; direction: rtl;
  }
  .quiz-close {
    position: absolute; top: 12px; left: 16px; background: none; border: none;
    font-size: 20px; cursor: pointer; color: var(--muted);
  }
  .quiz-title { font-size: 18px; font-weight: 700; color: var(--primary); margin-bottom: 0.25rem; }
  .quiz-progress { font-size: 13px; color: var(--muted); margin-bottom: 1.25rem; }
  .progress-bar { height: 6px; background: #e8e0f5; border-radius: 4px; margin-bottom: 1.5rem; }
  .progress-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width 0.3s; }
  .quiz-q { font-size: 15px; color: var(--text); font-weight: 600; margin-bottom: 1rem; line-height: 1.6; }
  .quiz-opts { display: flex; flex-direction: column; gap: 8px; }
  .opt-btn {
    background: #f5f3ff; border: 1.5px solid #e0d9f5; border-radius: 10px;
    padding: 10px 14px; text-align: right; cursor: pointer; font-family: inherit;
    font-size: 14px; color: var(--text); transition: all 0.15s;
  }
  .opt-btn:hover:not(:disabled) { background: #ece6ff; border-color: var(--primary); }
  .opt-btn.correct { background: #e0f7ed; border-color: #2db87a; color: #1a6b45; }
  .opt-btn.wrong { background: #fde8e8; border-color: #e24b4a; color: #7a1f1f; }
  .quiz-feedback { margin-top: 1rem; font-size: 14px; font-weight: 600; text-align: center; min-height: 20px; }
  .quiz-next-btn {
    margin-top: 1rem; width: 100%; background: var(--primary); color: #fff;
    border: none; border-radius: 10px; padding: 10px; font-family: inherit;
    font-size: 14px; font-weight: 700; cursor: pointer; display: none;
  }
  .quiz-score-box { text-align: center; padding: 1rem 0; }
  .quiz-score-big { font-size: 3rem; font-weight: 700; color: var(--primary); }
  .quiz-badge { font-size: 48px; margin: 0.5rem 0; }
  .quiz-score-msg { font-size: 16px; color: var(--text); margin-bottom: 1rem; }

  /* STARS */
  .stars { display: flex; gap: 4px; justify-content: center; margin: 0.5rem 0; }
  .star { font-size: 24px; }

  /* LEARNING HUB */
  .topic-card {
    background: var(--card-bg); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 1rem;
  }
  .topic-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; cursor: pointer; }
  .topic-title { font-size: 16px; font-weight: 700; color: var(--primary); flex: 1; }
  .topic-toggle { color: var(--muted); font-size: 20px; transition: transform 0.2s; }
  .topic-body { display: none; }
  .topic-body.open { display: block; }
  .topic-text { font-size: 14px; color: var(--text); line-height: 1.8; margin-bottom: 1rem; }
  .topic-points { list-style: none; padding: 0; }
  .topic-points li { font-size: 14px; color: var(--muted); padding: 4px 0; padding-right: 20px; position: relative; }
  .topic-points li::before { content: "◈"; color: var(--accent); position: absolute; right: 0; }
  .quiz-mini-btn {
    background: var(--green); color: #fff; border: none;
    padding: 8px 16px; border-radius: 8px; font-family: inherit; font-size: 13px;
    font-weight: 600; cursor: pointer; margin-top: 0.5rem;
  }

  /* FUN FACTS */
  .fact-card {
    background: var(--card-bg); border-radius: var(--radius);
    border-right: 4px solid var(--accent); padding: 1.25rem;
    margin-bottom: 1rem; display: flex; gap: 12px; align-items: flex-start;
  }
  .fact-icon { font-size: 28px; flex-shrink: 0; }
  .fact-title { font-size: 13px; color: var(--accent); font-weight: 700; margin-bottom: 4px; }
  .fact-text { font-size: 14px; color: var(--text); line-height: 1.6; }

  /* GALLERY */
  .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
  .gallery-item {
    background: var(--card-bg); border-radius: var(--radius);
    border: 1px solid var(--border); overflow: hidden; text-align: center;
  }
  .gallery-img {
    width: 100%; aspect-ratio: 1; display: flex; align-items: center;
    justify-content: center; font-size: 60px;
    background: linear-gradient(135deg, #f0ebff 0%, #e8f4f8 100%);
  }
  .gallery-label { padding: 0.75rem; }
  .gallery-name { font-size: 14px; font-weight: 700; color: var(--primary); margin-bottom: 2px; }
  .gallery-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }

  /* POINTS BAR */
  .points-bar {
    background: var(--primary); color: #fff;
    padding: 8px 2rem; display: flex; align-items: center; gap: 16px;
    font-size: 13px;
  }
  .points-val { font-size: 16px; font-weight: 700; color: #f7b8df; }
  .badge-list { display: flex; gap: 4px; }
  .badge-item { font-size: 18px; }

  @media(max-width:640px){
    .hero-grid { grid-template-columns: 1fr; }
    .grid-2, .grid-3, .gallery-grid { grid-template-columns: 1fr; }
    .nav-links { gap: 3px; }
    .nav-btn { padding: 5px 9px; font-size: 12px; }
  }
</style>
renderHub();
renderFacts();
renderGallery();
</script>
